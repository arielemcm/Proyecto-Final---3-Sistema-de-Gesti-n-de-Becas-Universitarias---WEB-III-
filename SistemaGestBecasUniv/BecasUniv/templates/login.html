{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sistema de Gestión de Becas UMSA</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="page-shell">
        <section class="brand-panel">
            <div class="brand-panel__content">
                <div class="brand-icon">🎓</div>
                <div>
                    <h1>Sistema de Gestión de Becas UMSA</h1>
                    <p>Gestión integral de postulaciones · Comité de Becas 2026</p>
                </div>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card">
                <div class="login-card__header">
                    <div class="login-card__icon">🔐</div>
                    <h2>Iniciar Sesión</h2>
                </div>
                {% if messages %}
                    <div class="login-alert">
                        {% for message in messages %}
                            <p>{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
                <form method="post" class="login-form">
                    {% csrf_token %}
                    <label for="username">Usuario</label>
                    <input id="username" name="username" type="text" placeholder="Usuario" required>

                    <label for="password">Contraseña</label>
                    <input id="password" name="password" type="password" placeholder="Contraseña" required>

                    <button type="submit">Ingresar</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
