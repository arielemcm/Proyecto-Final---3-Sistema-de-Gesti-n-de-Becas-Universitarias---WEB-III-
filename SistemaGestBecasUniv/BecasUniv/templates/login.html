{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSA · Sistema de Becas</title>

    {% load static %}

    <!-- FUENTE RUBIK -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        :root {
            --rojo-umsa: #e01017;
            --azul-umsa: #004767;
            --azul-1: #003b5c;
            --azul-2: #005b8c;
            --blanco: #ffffff;
            --negro: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--azul-umsa), var(--azul-1), var(--rojo-umsa));
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
        }

        /* PANEL IZQUIERDO */
        .left {
            background: linear-gradient(180deg, var(--azul-umsa), var(--azul-1));
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .left .logo-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: brightness(0) invert(1);
        }

        .left h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .left p {
            opacity: 0.8;
            font-size: 14px;
        }

        .left .decorative-line {
            width: 60px;
            height: 3px;
            background: var(--rojo-umsa);
            margin: 15px auto;
            border-radius: 10px;
        }

        /* PANEL LOGIN */
        .right {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-title i {
            background: var(--azul-umsa);
            color: white;
            padding: 12px;
            border-radius: 12px;
        }

        h2 {
            font-size: 22px;
            color: #1f2937;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }

        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-family: 'Rubik', sans-serif;
        }

        input:focus {
            border-color: var(--azul-umsa);
            box-shadow: 0 0 0 3px rgba(0,71,103,0.2);
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--azul-umsa), var(--azul-1));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Rubik', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .error {
            background: rgba(224,16,23,0.1);
            border: 1px solid rgba(224,16,23,0.3);
            color: var(--rojo-umsa);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                margin: 20px;
            }

            .left {
                padding: 30px;
            }

            .left .logo-img {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- IZQUIERDA -->
    <div class="left">
        <img src="{% static 'img/logo.png' %}" alt="Logo UMSA" class="logo-img">
        <h1>Sistema de Becas UMSA</h1>
        <div class="decorative-line"></div>
        <p>Universidad Mayor de San Andrés<br>Plataforma de gestión académica</p>
    </div>

    <!-- DERECHA -->
    <div class="right">

        <div class="card-title">
            <i class="fas fa-lock"></i>
            <h2>Iniciar Sesión</h2>
        </div>

        {% if messages %}
            <div class="error">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div>
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div>
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

    </div>

</div>

</body>
</html>
